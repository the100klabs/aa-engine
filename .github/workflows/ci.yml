name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev libx11-dev
      - name: Cargo check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Validate demo_game
        run: cargo run -p aa_cli -- validate examples/demo_game --format json
      - name: Validate open_world_studio
        run: cargo run -p aa_cli -- validate examples/open_world_studio --format json
      - name: Validate SARIF demo_game
        run: cargo run -p aa_cli -- validate examples/demo_game --format sarif
      - name: Index enemy camp query
        run: cargo run -p aa_cli -- index --project . --query "enemy camp sector" --json
      - name: P0 prefab spawn test
        run: cargo test -p aa_scene --test p0_gates spawn_player_prefab
      - name: P0 schedule ambiguity test
        run: cargo test -p aa_core --test schedule_ambiguity
      - name: P1 ability unit tests
        run: cargo test -p aa_ability --test p1_gates
      - name: P1 experience integration test
        run: cargo test -p aa_experience --test p1_gates
      - name: P1 gameplay integration test
        run: cargo test -p aa_gameplay --test p1_gates
      - name: P1 gameplay death loop test
        run: cargo test -p aa_gameplay --test death_loop
      - name: World stream unit tests
        run: cargo test -p aa_world_stream
      - name: Playtest smoke scenario
        run: cargo run -p aa_cli -- playtest --project examples/demo_game --scenario smoke --duration 12
      - name: Playtest fireball_hit scenario
        run: cargo run -p aa_cli -- playtest --project examples/demo_game --scenario fireball_hit --duration 12
      - name: Playtest locomotion_smoke scenario
        run: cargo run -p aa_cli -- playtest --project examples/demo_game --scenario locomotion_smoke --duration 10
      - name: Playtest death_respawn scenario (P1-10)
        run: cargo run -p aa_cli -- playtest --project examples/demo_game --scenario death_respawn --duration 38
      - name: World inspect open_world_studio
        run: cargo run -p aa_cli -- world inspect --project examples/open_world_studio --world open_world_studio --json
      - name: World inspect open_world_studio live
        run: cargo run -p aa_cli -- world inspect --project examples/open_world_studio --world open_world_studio --live --json
      - name: World cook open_world_studio
        run: cargo run -p aa_cli -- world cook --project examples/open_world_studio --world open_world_studio --verify --json
      - name: Playtest open_world_enemy_camp
        run: cargo run -p aa_cli -- playtest --project examples/open_world_studio --scenario open_world_enemy_camp --duration 25 --json
      - name: Profile summarize enemy camp trace
        run: cargo run -p aa_cli -- profile summarize examples/open_world_studio/artifacts/profiles/open_world_enemy_camp.trace --json
      - name: Playtest open_world_sector_traverse
        run: cargo run -p aa_cli -- playtest --project examples/open_world_studio --scenario open_world_sector_traverse --duration 20 --json
      - name: Eval open_world_studio_enemy_camp
        run: cargo run -p aa_cli -- eval run open_world_studio_enemy_camp --json
      - name: Eval open_world_studio_elemental_ability
        run: cargo run -p aa_cli -- eval run open_world_studio_elemental_ability --json
      - name: Config merge order test
        run: cargo test -p aa_core --test config_merge_order

  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev libx11-dev
      - name: Bootstrap CLI contract tests
        run: python3 docs/specs/tools/test_bootstrap_cli.py
      - name: Spec traceability audit (P0-07)
        run: python3 docs/specs/tools/audit_traceability.py
      - name: Validate contract fixtures
        run: python3 docs/specs/tools/validate_contract_fixtures.py
