schema_version = 1
name = "demo_game"
version = "0.1.0"

[engine]
config_root = "config"
assets_root = "assets"
default_experience = "experiences/demo"
startup_scene = "scenes/main_menu"

[plugins]
runtime = [
    "aa_core",
    "aa_assets",
    "aa_tags",
    "aa_input",
    "aa_ability",
    "aa_experience",
    "aa_scene",
    "aa_gameplay",
    "aa_physics",
    "aa_animation",
]

[features]
enabled = []

[build]
default_binary = "demo_game"
